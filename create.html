<!DOCTYPE html>
<html>
<head>
<title>Create Capsule</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-main">

<div class="form-box">

<h2>Create Capsule</h2>

<p class="quote">“One day, this will matter more than you think.”</p>
<p class="sub">Capture it before it fades.</p>

<input id="title" placeholder="Memory Title">
<textarea id="textData" placeholder="Write your memory..."></textarea>

<input type="file" id="fileData">
<input type="datetime-local" id="unlockTime">

<button onclick="saveCapsule()">Lock Capsule</button>

</div>

<script src="script.js"></script>
</body>
</html>
