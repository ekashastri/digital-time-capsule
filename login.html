<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="bg-main center">

<div class="auth-card">
<h2>Welcome Back</h2>

<p class="quote">“A message to your future self.”</p>
<p class="sub">Store what matters. Let time reveal it.</p>

<input id="username" placeholder="Username">

<div class="password-box">
<input id="password" type="password" placeholder="Password">
<span class="eye" onclick="togglePassword()">👁️</span>
</div>

<button class="primary" onclick="login()">Login</button>
<button class="secondary" onclick="signup()">Create Account</button>
</div>

<script src="script.js"></script>
</body>
</html>
